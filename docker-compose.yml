version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: market_insights
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - market_network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - market_network

  backend:
    build: ./backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn market_insights.wsgi:application --bind 0.0.0.0:8000"
    environment:
      DEBUG: 'False'
      DB_NAME: market_insights
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    networks:
      - market_network

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8000/api
    depends_on:
      - backend
    networks:
      - market_network

volumes:
  postgres_data:
  static_volume:
  media_volume:

networks:
  market_network:
    driver: bridge
